<!--
  Jelly Crowd "My media" page. Fetched by Plugin Pages and injected as a fragment; assets load via
  absolute URLs.
-->
<div id="jellyCrowdMedia" class="jellycrowd">
  <header class="jellycrowd-header">
    <h1 id="jcMediaTitle" class="jellycrowd-title"></h1>
  </header>
  <section class="jellycrowd-section">
    <p id="jcMediaMessage" class="jellycrowd-message" hidden></p>
    <div id="jcMediaList" class="jellycrowd-list" aria-live="polite"></div>
  </section>
</div>

<script>
  (function () {
    var get = (window.ApiClient && window.ApiClient.getUrl)
      ? function (p) { return window.ApiClient.getUrl(p); }
      : function (p) { return '/' + p; };

    if (!document.getElementById('jellycrowd-css')) {
      var css = document.createElement('link');
      css.id = 'jellycrowd-css';
      css.rel = 'stylesheet';
      css.href = get('JellyCrowd/Web/jellycrowd.css');
      document.head.appendChild(css);
    }

    function start() {
      var s = document.createElement('script');
      s.src = get('JellyCrowd/Web/mymedia.js');
      document.head.appendChild(s);
    }

    if (window.JellyCrowdLib) {
      start();
    } else {
      var lib = document.createElement('script');
      lib.src = get('JellyCrowd/Web/catalog.lib.js');
      lib.onload = start;
      document.head.appendChild(lib);
    }
  })();
</script>
