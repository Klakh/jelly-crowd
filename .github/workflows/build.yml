name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'
          if-no-files-found: ignore

      - name: Package plugin
        run: |
          mkdir -p artifacts
          cp Jellyfin.Plugin.JellyCrowd/bin/Release/net9.0/Jellyfin.Plugin.JellyCrowd.dll artifacts/
          cp build.yaml artifacts/
          cd artifacts && zip jelly-crowd.zip Jellyfin.Plugin.JellyCrowd.dll build.yaml

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: jelly-crowd-plugin
          path: artifacts/jelly-crowd.zip
